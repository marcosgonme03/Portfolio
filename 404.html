<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="robots" content="noindex" />
  <title>404 — Página no encontrada | Marcos González</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .err-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .err-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,106,0,0.12) 0%, transparent 70%);
      border-radius: 50%;
      animation: glowPulse 6s ease-in-out infinite;
      pointer-events: none;
      z-index: -1;
    }
    .err-num {
      font-family: var(--font-display);
      font-size: clamp(7rem, 22vw, 14rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #ff6a00, #ff8c00);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .err-title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    .err-sub {
      color: var(--clr-gray-300);
      max-width: 480px;
      margin-bottom: 2.5rem;
      font-size: 1.05rem;
    }
    .err-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <main class="err-page">
    <div class="err-glow" aria-hidden="true"></div>
    <p class="err-num" aria-hidden="true">404</p>
    <h1 class="err-title">Esta ruta no existe</h1>
    <p class="err-sub">
      Parece que la página que buscas se ha desviado del flujo. Volvamos al camino principal.
    </p>
    <div class="err-actions">
      <a href="/" class="btn btn-primary">
        Volver al inicio <span aria-hidden="true">→</span>
      </a>
      <a href="/#projects" class="btn btn-ghost">Ver proyectos</a>
    </div>
  </main>
</body>
</html>
